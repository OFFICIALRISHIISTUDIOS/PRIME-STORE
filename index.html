<!DOCTYPE html>
<html>
<head>
  <title>Prime Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Google Identity Script -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- ✅ Cloudflare Turnstile Script -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 50px;
    }
    .box {
      background: #222;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Prime Store</h1>
  <p>Login with Google</p>

  <!-- ✅ Turnstile Widget -->
  <div class="cf-turnstile" data-sitekey="0x4AAAAAAC2GFZYs7EtHHB2v"></div>

  <!-- Google Login Button -->
  <div id="g_id_onload"
       data-client_id="677891932982-j5aqitdq2r7b6hr3pr9ir7bqi6si0pu9.apps.googleusercontent.com"
       data-callback="handleCredentialResponse">
  </div>

  <div class="g_id_signin" data-type="standard"></div>

  <p id="user"></p>
</div>

<script>
  function handleCredentialResponse(response) {
    const data = parseJwt(response.credential);
    document.getElementById("user").innerHTML =
      "Welcome " + data.name + " (" + data.email + ")";
  }

  function parseJwt(token) {
    let base64Url = token.split('.')[1];
    let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(jsonPayload);
  }
</script>

</body>
</html>
